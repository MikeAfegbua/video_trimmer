name: video_trimmer
description: A Flutter package for trimming videos. This supports retrieving, trimming, and storage of trimmed video files to the file system.

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  video_player: ^2.7.2
  ffmpeg_kit_flutter_full_gpl: ^6.0.3
  # video_thumbnail: ^0.5.3
  video_thumbnail:
    git:
      url: https://github.com/MikeAfegbua/video_thumbnail.git
      ref: master

  path_provider: ^2.1.1
  intl: ^0.19.0
  path: ^1.8.3
  transparent_image: ^2.0.1

dev_dependencies:
  flutter_lints: ^2.0.1
  lints: ^2.0.1

flutter:
  uses-material-design: true
